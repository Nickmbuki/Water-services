# Railway service map for the Water Services platform.
# Railway currently reads railway.toml or railway.json for config-as-code.
# Use this YAML file as a deployment checklist, and point each Railway service
# to the matching config file below.

project: water-services
services:
  backend:
    rootDirectory: /backend
    configFile: /backend/railway.toml
    healthcheckPath: /health
    requiredVariables:
      - DATABASE_URL
      - JWT_SECRET
      - FRONTEND_URL
      - MPESA_CONSUMER_KEY
      - MPESA_CONSUMER_SECRET
      - MPESA_PASSKEY
      - MPESA_SHORTCODE
      - MPESA_CALLBACK_URL
      - PAYPAL_CLIENT_ID
      - PAYPAL_CLIENT_SECRET
  frontend:
    rootDirectory: /frontend
    configFile: /frontend/railway.toml
    requiredVariables:
      - VITE_API_URL
